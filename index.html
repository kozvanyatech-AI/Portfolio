<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta
      name="description"
      content="Kozvanya Agency - Scaling Ideas Into Intelligent Solutions. We build modern, scalable digital products for startups and businesses."
    />
    <meta
      name="keywords"
      content="web development, react, SaaS, UI/UX design, AI integrations, digital agency"
    />
    <meta name="author" content="Kozvanya Agency" />
    <meta name="theme-color" content="#0ea5e9" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kozvanya.com" />
    <meta
      property="og:title"
      content="Kozvanya Agency - Scaling Ideas Into Intelligent Solutions"
    />
    <meta
      property="og:description"
      content="Build modern, scalable digital products with our expert team. Web development, SaaS, UI/UX design, and AI integrations."
    />
    <meta property="og:image" content="https://kozvanya.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://kozvanya.com" />
    <meta name="twitter:title" content="Kozvanya Agency" />
    <meta
      name="twitter:description"
      content="Scaling Ideas Into Intelligent Solutions"
    />
    <meta
      name="twitter:image"
      content="https://kozvanya.com/twitter-image.png"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://kozvanya.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/src/assets/icons/icon.png" />
    <link rel="shortcut icon" type="image/png" href="/src/assets/icons/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preconnect to optimize font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Modern Typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <title>Kozvanya</title>
  </head>
  <body class="bg-gray-900 text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Kozvanya Agency",
        "description": "Scaling Ideas Into Intelligent Solutions",
        "url": "https://kozvanya.com",
        "logo": "https://kozvanya.com/logo.png",
        "sameAs": [
          "https://linkedin.com/company/kozvanya",
          "https://twitter.com/kozvanya"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "US",
          "addressLocality": "New York"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "General Business",
          "email": "hello@kozvanya.com"
        }
      }
    </script>
  </body>
</html>
